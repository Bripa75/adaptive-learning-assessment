<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Ripa Elevate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/nav.css">
<link rel="stylesheet" href="../css/components.css">
<style>
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px 40px;}
.auth-card{width:100%;max-width:420px;background:var(--white);border:1px solid var(--s200);border-radius:var(--r24);padding:44px 40px;}
.auth-logo{display:flex;align-items:center;gap:9px;justify-content:center;margin-bottom:28px;text-decoration:none;}
.auth-logo-mark{width:32px;height:32px;background:var(--s900);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.auth-logo-text{font-family:var(--serif);font-size:1.2rem;color:var(--s900);}
.auth-logo-text em{color:var(--sage);font-style:italic;}
.auth-title{font-family:var(--serif);font-size:1.6rem;color:var(--s900);text-align:center;margin-bottom:6px;}
.auth-sub{font-size:.83rem;color:var(--s400);text-align:center;margin-bottom:28px;}
.auth-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--s300);font-size:.75rem;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--s200);}
.auth-switch{text-align:center;font-size:.83rem;color:var(--s500);margin-top:20px;}
.auth-switch a{color:var(--s900);font-weight:500;text-decoration:none;}
.auth-switch a:hover{text-decoration:underline;}
.forgot-link{font-size:.78rem;color:var(--s400);text-decoration:none;float:right;margin-top:-2px;}
.forgot-link:hover{color:var(--s700);}
</style>
</head>
<body>

<nav id="nav" class="solid">
  <a href="../index.html" class="nav-logo">
    <div class="nav-logo-mark"><svg viewBox="0 0 20 20" fill="none" width="20" height="20"><path d="M4 10C4 6.686 6.686 4 10 4" stroke="white" stroke-width="2" stroke-linecap="round"/><path d="M16 10C16 13.314 13.314 16 10 16" stroke="#7c9a7e" stroke-width="2" stroke-linecap="round"/><circle cx="10" cy="10" r="2" fill="white"/></svg></div>
    Ripa <em>Elevate</em>
  </a>
  <div></div>
  <div class="nav-auth"><a href="signup.html" class="nav-cta">Create account</a></div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <a href="../index.html" class="auth-logo">
      <div class="auth-logo-mark"><svg viewBox="0 0 20 20" fill="none" width="18" height="18"><path d="M4 10C4 6.686 6.686 4 10 4" stroke="white" stroke-width="2" stroke-linecap="round"/><path d="M16 10C16 13.314 13.314 16 10 16" stroke="#7c9a7e" stroke-width="2" stroke-linecap="round"/><circle cx="10" cy="10" r="2" fill="white"/></svg></div>
      <span class="auth-logo-text">Ripa <em>Elevate</em></span>
    </a>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your parent account</p>

    <div id="error-banner" class="alert alert-error hidden">Incorrect email or password. Please try again.</div>

    <div class="form-group">
      <label class="form-label" for="email">Email address <span class="req">*</span></label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">
        Password <span class="req">*</span>
        <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
      </label>
      <input class="form-input" type="password" id="password" placeholder="Your password" autocomplete="current-password" required>
    </div>

    <button class="btn btn-dark btn-full" id="btn-login" onclick="doLogin()">Sign In</button>

    <div class="auth-divider">or</div>

    <div class="auth-switch">
      Don't have an account? <a href="signup.html">Create one free →</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/nav.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  // Redirect if already logged in
  await AuthManager.requireGuest('/app/parent-dashboard.html');
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  clearFormErrors();
  document.getElementById('error-banner').classList.add('hidden');

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn-login');

  if (!email || !password) {
    if (!email)    showFormError('email',    'Email is required');
    if (!password) showFormError('password', 'Password is required');
    return;
  }

  setButtonLoading(btn, true, 'Signing in…');

  const { data, error } = await AuthManager.signIn(email, password);

  if (error) {
    setButtonLoading(btn, false);
    document.getElementById('error-banner').classList.remove('hidden');
    return;
  }

  // Check if admin — redirect to admin dashboard
  const isAdmin = await RE.Profiles.isAdmin(data.user.id);
  if (isAdmin) {
    window.location.href = '/admin/dashboard.html';
  } else {
    window.location.href = '/app/parent-dashboard.html';
  }
}
</script>
</body>
</html>
