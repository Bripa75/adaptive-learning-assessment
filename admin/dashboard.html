<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — Ripa Elevate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/nav.css">
<link rel="stylesheet" href="../css/components.css">
<style>
.activity-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--white);}
.act-icon{font-size:1.1rem;flex-shrink:0;}
.act-main{flex:1;}
.act-name{font-size:.84rem;font-weight:600;color:var(--s900);}
.act-meta{font-size:.72rem;color:var(--s500);margin-top:1px;}
.act-date{font-size:.72rem;color:var(--s400);flex-shrink:0;}
.bar-chart{display:flex;align-items:flex-end;gap:6px;width:100%;height:100px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar-fill{width:100%;background:var(--sage);border-radius:3px 3px 0 0;min-height:4px;}
.bar-label{font-size:.58rem;color:var(--s400);text-align:center;white-space:nowrap;}
</style>
</head>
<body>
<nav id="nav" class="solid dark-nav">
  <a href="../index.html" class="nav-logo" style="color:var(--white)">
    <div class="nav-logo-mark"><svg viewBox="0 0 20 20" fill="none" width="20" height="20"><path d="M4 10C4 6.686 6.686 4 10 4" stroke="white" stroke-width="2" stroke-linecap="round"/><path d="M16 10C16 13.314 13.314 16 10 16" stroke="#7c9a7e" stroke-width="2" stroke-linecap="round"/><circle cx="10" cy="10" r="2" fill="white"/></svg></div>
    Ripa <em style="color:var(--sage)">Elevate</em>
  </a>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="chip chip-sage" style="font-size:.68rem">Admin</span>
    <a href="students.html"    class="nav-link" style="color:var(--s400)">Students</a>
    <a href="leads.html"       class="nav-link" style="color:var(--s400)">Leads</a>
    <a href="revenue.html"     class="nav-link" style="color:var(--s400)">Revenue</a>
    <button class="btn btn-sm" style="background:var(--s800);color:var(--s400);border:1px solid var(--s700)" onclick="AuthManager.signOut()">Sign Out</button>
  </div>
</nav>

<div class="page-body">
  <div class="wrap" style="padding-top:32px;padding-bottom:96px">

    <div style="margin-bottom:28px">
      <div class="lbl lbl-sage">Admin Portal</div>
      <h1 class="dis mt-10" style="font-size:2rem">Platform Overview</h1>
    </div>

    <div class="kpi-grid" style="margin-bottom:32px">
      <div class="kpi-card"><div class="kpi-label">Total Students</div><div class="kpi-value" id="stat-students">—</div></div>
      <div class="kpi-card"><div class="kpi-label">Assessments Done</div><div class="kpi-value" id="stat-assessments">—</div></div>
      <div class="kpi-card"><div class="kpi-label">Active Subscribers</div><div class="kpi-value" id="stat-subs">—</div></div>
      <div class="kpi-card"><div class="kpi-label">Total Leads</div><div class="kpi-value" id="stat-leads">—</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:20px">
      <div>
        <div class="flex-between mb-16">
          <h2 style="font-family:var(--serif);font-size:1.1rem">Recent Assessments</h2>
          <a href="students.html" class="btn btn-outline btn-sm">View All →</a>
        </div>
        <div id="activity-feed" style="display:flex;flex-direction:column;gap:1px;background:var(--s200);border-radius:var(--r16);overflow:hidden">
          <div style="padding:32px;background:var(--white);text-align:center"><div class="spinner" style="margin:0 auto"></div></div>
        </div>
      </div>
      <div>
        <h2 style="font-family:var(--serif);font-size:1.1rem;margin-bottom:14px">Weekly Activity</h2>
        <div id="weekly-chart" style="background:var(--white);border:1px solid var(--s200);border-radius:var(--r16);padding:20px 20px 12px;min-height:140px;display:flex;align-items:flex-end">
          <p style="width:100%;text-align:center;color:var(--s400);font-size:.8rem">Loading…</p>
        </div>
        <h2 style="font-family:var(--serif);font-size:1.1rem;margin:20px 0 12px">Quick Links</h2>
        <div style="display:flex;flex-direction:column;gap:8px">
          <a href="students.html"      class="btn btn-outline btn-full" style="justify-content:flex-start">👦 All Students</a>
          <a href="leads.html"         class="btn btn-outline btn-full" style="justify-content:flex-start">📋 Leads Pipeline</a>
          <a href="revenue.html"       class="btn btn-outline btn-full" style="justify-content:flex-start">💳 Revenue</a>
          <a href="questions-mgr.html" class="btn btn-outline btn-full" style="justify-content:flex-start">✏️ Question Manager</a>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const ok = await AdminApp.init();
  if (!ok) return;
  await Promise.all([AdminApp.loadStats(), AdminApp.loadActivity(), AdminApp.loadWeeklyChart()]);
});
</script>
</body>
</html>
