<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Ripa Elevate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
<style>
body{background:var(--s900);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.admin-login-box{background:var(--s800);border:1px solid var(--s700);border-radius:var(--r24);padding:44px 40px;width:100%;max-width:400px;}
.al-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;}
.al-logo-mark{width:34px;height:34px;background:var(--sage);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.al-logo-text{font-family:var(--serif);font-size:1.1rem;color:var(--white);}
.al-logo-sub{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--s500);display:block;}
.admin-login-box h1{font-family:var(--serif);font-size:1.5rem;color:var(--white);margin-bottom:6px;}
.admin-login-box .sm{color:var(--s500);margin-bottom:28px;}
.admin-login-box .form-label{color:var(--s400);}
.admin-login-box .form-input{background:var(--s700);border-color:var(--s600);color:var(--white);}
.admin-login-box .form-input::placeholder{color:var(--s500);}
.admin-login-box .form-input:focus{border-color:var(--sage);background:var(--s700);}
</style>
</head>
<body>
<div class="admin-login-box">
  <div class="al-logo">
    <div class="al-logo-mark"><svg viewBox="0 0 20 20" fill="none" width="16" height="16"><path d="M4 10C4 6.686 6.686 4 10 4" stroke="white" stroke-width="2.2" stroke-linecap="round"/><path d="M16 10C16 13.314 13.314 16 10 16" stroke="white" stroke-width="2.2" stroke-linecap="round"/><circle cx="10" cy="10" r="2" fill="white"/></svg></div>
    <div>
      <div class="al-logo-text">Ripa Elevate</div>
      <span class="al-logo-sub">Admin Portal</span>
    </div>
  </div>
  <h1>Founders only</h1>
  <p class="sm">This area is restricted to admin accounts.</p>

  <div id="login-error" class="alert alert-error hidden"></div>

  <div class="form-group">
    <label class="form-label">Email</label>
    <input type="email" id="a-email" class="form-input" placeholder="your@email.com">
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <input type="password" id="a-password" class="form-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')adminLogin()">
  </div>
  <button class="btn btn-sage btn-full mt-8" id="login-btn" onclick="adminLogin()">Sign In to Admin</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  // If already logged in and admin, go to dashboard
  const session = await RE.Auth.getSession();
  if (session) {
    const isAdmin = await RE.Profiles.isAdmin(session.user.id);
    if (isAdmin) window.location.href = 'dashboard.html';
  }
});

async function adminLogin() {
  const email    = document.getElementById('a-email').value.trim();
  const password = document.getElementById('a-password').value;
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('login-btn');

  errEl.classList.add('hidden');
  setButtonLoading(btn, true, 'Signing in…');

  const { data, error } = await RE.Auth.signIn(email, password);

  if (error) {
    setButtonLoading(btn, false);
    errEl.textContent = 'Invalid email or password.';
    errEl.classList.remove('hidden');
    return;
  }

  const isAdmin = await RE.Profiles.isAdmin(data.user.id);
  if (!isAdmin) {
    await RE.Auth.signOut();
    setButtonLoading(btn, false);
    errEl.textContent = 'This account does not have admin access.';
    errEl.classList.remove('hidden');
    return;
  }

  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
